<!-- OVERLAY -->
<div
  class="fixed inset-0 z-50 flex justify-center items-center bg-black/60 backdrop-blur-sm animate-fade-in transition-opacity duration-300">

  <!-- MODAL -->
  <div
    class="relative flex flex-col md:flex-row bg-white rounded-[10px] shadow-2xl w-[95%] max-w-3xl overflow-hidden animate-fade-in-up">

    <!-- BOTÓN CERRAR -->
    <button (click)="cerrarModal()"
      class="absolute z-50 top-4 left-4 text-gray-500 hover:text-gray-700 text-2xl font-bold transition-transform hover:scale-110">
      ✖
    </button>

    <!-- PANEL IZQUIERDO -->
    <section class="flex-1 p-6 bg-gray-50 border-r border-gray-200 flex flex-col relative">
      <h2 class="text-2xl font-semibold mb-5 text-gray-800 text-center">
        Presupuesto Detallado
      </h2>
      <button (click)="descargarPDF()"
        class="absolute right-5 top-7 flex gap-2 hover:scale-[1.02] transition-transform">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
          class="size-6">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M12 9.75v6.75m0 0-3-3m3 3 3-3m-8.25 6a4.5 4.5 0 0 1-1.41-8.775 5.25 5.25 0 0 1 10.233-2.33 3 3 0 0 1 3.758 3.848A3.752 3.752 0 0 1 18 19.5H6.75Z" />
        </svg>
        <span>PDF</span>
      </button>

      <span class="p-2 text-gray-600 text-2xl font-semibold">Total: {{budgetService.totalCost() | currency}}</span>
      <div class="flex-1 overflow-y-auto">
        <table class="w-full table-auto border-collapse">
          <thead>
            <tr>
              <th class="border-b p-2 text-left text-gray-600">Tipo</th>
              <th class="border-b p-2 text-left text-gray-600">Material</th>
              <th class="border-b p-2 text-right text-gray-600">Subtotal</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let item of budgetService.categoryAndMaterials()">
              <td class="border-b p-2 text-gray-600">{{ item.categoria }}</td>
              <td class="border-b p-2 text-gray-600">{{ item.material }}</td>
              <td class="border-b p-2 text-right text-gray-600">{{item.total | currency}}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>
</div>
