<main class="min-h-full flex flex-col p-6 animate-fade-in relative overflow-x-hidden">
  <!-- Tarjeta Principal Glassmorphism -->
  <article class="max-w-5xl w-full mx-auto bg-[#0d1e2b]/80 backdrop-blur-2xl border border-white/10 rounded-3xl shadow-[0_15px_40px_rgba(0,0,0,0.5)] overflow-hidden">
    
    <!-- HEADER CON GRADIENTE Y BOTÓN -->
    <header class="relative px-6 md:px-10 py-8 flex flex-col sm:flex-row gap-6 items-start sm:items-center justify-between overflow-hidden">
      <div class="absolute inset-0 bg-gradient-to-r from-indigo-500/10 to-purple-500/10 pointer-events-none"></div>
      <div class="absolute inset-x-0 bottom-0 h-px bg-gradient-to-r from-transparent via-white/20 to-transparent"></div>
      
      <div class="relative z-10 flex items-center gap-5">
        <div class="p-3.5 bg-white/5 rounded-2xl border border-white/10 shadow-inner">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-8 h-8 text-indigo-400"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" /></svg>
        </div>
        <div>
          <h2 class="text-2xl md:text-3xl font-extrabold text-white tracking-tight">Tu Perfil</h2>
          <p class="text-indigo-200/60 text-sm mt-1 font-medium">Gestiona tu información personal y preferencias</p>
        </div>
      </div>
      
      <button (click)="switchEdition()"
        class="relative z-10 flex items-center gap-2.5 px-5 py-2.5 bg-white/5 hover:bg-white/15 text-white text-sm font-semibold rounded-xl border border-white/10 shadow-[0_4px_15px_rgba(0,0,0,0.2)] transition-all duration-300 hover:scale-105 active:scale-95 group">
        @if(isReadOnly) {
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4 text-indigo-400 group-hover:text-indigo-300"><path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L6.832 19.82a4.5 4.5 0 01-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 011.13-1.897L16.863 4.487zm0 0L19.5 7.125" /></svg>
          Habilitar Edición
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4 text-red-400 group-hover:text-red-300"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
          Cancelar Edición
        }
      </button>
    </header>

    <!-- CONTENIDO: AVATAR + FORM -->
    <div class="px-6 md:px-10 py-10 grid grid-cols-1 lg:grid-cols-[300px_1fr] gap-12 lg:gap-16">
      
      <!-- AVATAR PANEL -->
      <div class="flex flex-col items-center">
        <figure class="relative group">
          <!-- Anillo exterior brillante -->
          <div class="absolute -inset-1.5 bg-gradient-to-tr from-indigo-500 to-purple-500 rounded-full blur-md opacity-30 group-hover:opacity-60 transition duration-500"></div>
          <!-- Contenedor imagen -->
          <div class="relative w-52 h-52 rounded-full border-[5px] border-[#0d1e2b] overflow-hidden bg-[#0d1e2b] shadow-2xl">
            <img src="{{currentUser().url}}" alt="Avatar del usuario"
              class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" />
            
            <!-- Overlay Hover para subir foto -->
            <label for="perfil"
              class="absolute inset-0 bg-black/60 backdrop-blur-sm opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col items-center justify-center cursor-pointer"
              [class.hidden]="isReadOnly">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-9 h-9 text-white mb-2"><path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z" /><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0zM18.75 10.5h.008v.008h-.008V10.5z" /></svg>
              <span class="text-white text-xs font-bold uppercase tracking-wider">Subir Foto</span>
            </label>
            <input type="file" id="perfil" (change)="onUpdloadImage($event)" class="hidden" [disabled]="isReadOnly">
          </div>
          
          <!-- Badge flotante (rol) -->
          <div class="absolute -bottom-4 inset-x-0 flex justify-center">
            <span class="px-5 py-1.5 bg-gradient-to-r from-emerald-500 to-teal-500 text-white text-xs font-bold uppercase tracking-widest rounded-full shadow-[0_5px_15px_rgba(16,185,129,0.4)] border border-white/20 truncate max-w-[90%]">
              {{ currentUser().rol || 'Usuario' }}
            </span>
          </div>
        </figure>
        
        <div class="mt-10 text-center w-full">
          <div class="bg-white/5 rounded-2xl p-5 border border-white/5 shadow-inner">
            <h4 class="text-xs font-bold text-white/40 uppercase tracking-[0.2em] mb-2">Estado del Plan</h4>
            <div class="flex items-center justify-center gap-3 mt-3">
              <span class="w-3 h-3 rounded-full bg-emerald-400 animate-pulse shadow-[0_0_12px_rgba(52,211,153,0.8)]"></span>
              <span class="text-emerald-400 font-semibold text-sm tracking-wide">Activo y Verificado</span>
            </div>
          </div>
        </div>
      </div>

      <!-- FORMULARIO DE CAMPOS -->
      <form [formGroup]="informationForm" (submit)="onSubmit()" class="flex flex-col gap-8 h-full">
        
        <!-- Grid de campos -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-7">
          
          <!-- Nombre -->
          <div class="flex flex-col group">
            <label for="nombre" class="text-xs font-bold text-white/50 uppercase tracking-widest mb-2.5 ml-1 transition-colors group-focus-within:text-indigo-400">Nombre</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 flex items-center pl-4.5 pointer-events-none">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 text-white/30 ml-4"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" /></svg>
              </div>
              <input [readonly]="isReadOnly" formControlName="nombre" id="nombre" type="text"
                class="w-full bg-black/20 border border-white/5 text-white text-sm font-medium rounded-2xl pl-12 pr-4 py-3.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white/5 focus:border-indigo-500/50 transition-all shadow-inner"
                [class.opacity-60]="isReadOnly" [class.cursor-not-allowed]="isReadOnly" />
            </div>
          </div>

          <!-- Apellido -->
          <div class="flex flex-col group">
            <label for="apellido" class="text-xs font-bold text-white/50 uppercase tracking-widest mb-2.5 ml-1 transition-colors group-focus-within:text-indigo-400">Apellido</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 flex items-center pl-4.5 pointer-events-none">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 text-white/30 ml-4"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" /></svg>
              </div>
              <input [readonly]="isReadOnly" formControlName="apellido" id="apellido" type="text"
                class="w-full bg-black/20 border border-white/5 text-white text-sm font-medium rounded-2xl pl-12 pr-4 py-3.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white/5 focus:border-indigo-500/50 transition-all shadow-inner"
                [class.opacity-60]="isReadOnly" [class.cursor-not-allowed]="isReadOnly" />
            </div>
          </div>

          <!-- Email -->
          <div class="flex flex-col group">
            <label for="email" class="text-xs font-bold text-white/50 uppercase tracking-widest mb-2.5 ml-1 transition-colors group-focus-within:text-indigo-400">Correo Electrónico</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 flex items-center pl-4.5 pointer-events-none">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 text-white/30 ml-4"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" /></svg>
              </div>
              <input [readonly]="isReadOnly" formControlName="email" id="email" type="email"
                class="w-full bg-black/20 border border-white/5 text-white text-sm font-medium rounded-2xl pl-12 pr-4 py-3.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white/5 focus:border-indigo-500/50 transition-all shadow-inner"
                [class.opacity-60]="isReadOnly" [class.cursor-not-allowed]="isReadOnly" />
            </div>
          </div>

          <!-- Teléfono -->
          <div class="flex flex-col group">
            <label for="telefono" class="text-xs font-bold text-white/50 uppercase tracking-widest mb-2.5 ml-1 transition-colors group-focus-within:text-indigo-400">Teléfono</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 flex items-center pl-4.5 pointer-events-none">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 text-white/30 ml-4"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 01-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z" /></svg>
              </div>
              <input [readonly]="isReadOnly" formControlName="telefono" id="telefono" type="tel"
                class="w-full bg-black/20 border border-white/5 text-white text-sm font-medium rounded-2xl pl-12 pr-4 py-3.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white/5 focus:border-indigo-500/50 transition-all shadow-inner"
                [class.opacity-60]="isReadOnly" [class.cursor-not-allowed]="isReadOnly" />
            </div>
          </div>

          <!-- Profesión -->
          <div class="flex flex-col group">
            <label for="profesion" class="text-xs font-bold text-white/50 uppercase tracking-widest mb-2.5 ml-1 transition-colors group-focus-within:text-indigo-400">Profesión / Ocupación</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 flex items-center pl-4.5 pointer-events-none">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 text-white/30 ml-4"><path stroke-linecap="round" stroke-linejoin="round" d="M20.25 14.15v4.25c0 1.094-.787 2.036-1.872 2.18-2.087.277-4.216.42-6.378.42s-4.291-.143-6.378-.42c-1.085-.144-1.872-1.086-1.872-2.18v-4.25m16.5 0a2.18 2.18 0 00.75-1.661V8.706c0-1.081-.768-2.015-1.837-2.175a48.114 48.114 0 00-3.413-.387m4.5 8.006c-.194.165-.42.295-.673.38A23.978 23.978 0 0112 15.75c-2.648 0-5.195-.429-7.577-1.22a2.016 2.016 0 01-.673-.38m0 0A2.18 2.18 0 013 12.489V8.706c0-1.081.768-2.015 1.837-2.175a48.111 48.111 0 013.413-.387m7.5 0V5.25A2.25 2.25 0 0013.5 3h-3a2.25 2.25 0 00-2.25 2.25v.894m7.5 0a48.667 48.667 0 00-7.5 0M12 12.75h.008v.008H12v-.008z" /></svg>
              </div>
              <input [readonly]="isReadOnly" formControlName="profesion" id="profesion" type="text"
                class="w-full bg-black/20 border border-white/5 text-white text-sm font-medium rounded-2xl pl-12 pr-4 py-3.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white/5 focus:border-indigo-500/50 transition-all shadow-inner"
                [class.opacity-60]="isReadOnly" [class.cursor-not-allowed]="isReadOnly" />
            </div>
          </div>

          <!-- Fecha Nacimiento -->
          <div class="flex flex-col group">
            <label for="fechaNacimiento" class="text-xs font-bold text-white/50 uppercase tracking-widest mb-2.5 ml-1 transition-colors group-focus-within:text-indigo-400">Nacimiento</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 flex items-center pl-4.5 pointer-events-none">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 text-white/30 ml-4"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5m-9-6h.008v.008H12v-.008ZM12 15h.008v.008H12V15Zm0 2.25h.008v.008H12v-.008ZM9.75 15h.008v.008H9.75V15Zm0 2.25h.008v.008H9.75v-.008ZM7.5 15h.008v.008H7.5V15Zm0 2.25h.008v.008H7.5v-.008Zm6.75-4.5h.008v.008h-.008v-.008Zm0 2.25h.008v.008h-.008V15Zm0 2.25h.008v.008h-.008v-.008Zm2.25-4.5h.008v.008H16.5v-.008Zm0 2.25h.008v.008H16.5V15Z" /></svg>
              </div>
              <input [readonly]="isReadOnly" formControlName="fechaNacimiento" id="fechaNacimiento" type="date"
                class="w-full bg-black/20 border border-white/5 text-white text-sm font-medium rounded-2xl pl-12 pr-4 py-3.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white/5 focus:border-indigo-500/50 transition-all shadow-inner [color-scheme:dark]"
                [class.opacity-60]="isReadOnly" [class.cursor-not-allowed]="isReadOnly" />
            </div>
          </div>
          
          <div class="col-span-1 md:col-span-2 h-px w-full bg-gradient-to-r from-transparent via-white/10 to-transparent my-3"></div>

          <!-- Plan (Readonly) -->
          <div class="flex flex-col group">
            <label for="plan" class="text-xs font-bold text-white/50 uppercase tracking-widest mb-2.5 ml-1">Plan Actual</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 flex items-center pl-4.5 pointer-events-none">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 text-emerald-400/70 ml-4"><path stroke-linecap="round" stroke-linejoin="round" d="M11.48 3.499a.562.562 0 011.04 0l2.125 5.111a.563.563 0 00.475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 00-1.81.688l1.15 5.073c.114.506-.414.89-1.81.688l-4.706-2.818a.563.563 0 00-.546 0l-4.706 2.818c-.396.237-.924-.147-.81-6.688a.563.563 0 00-.181-.688l-4.204-3.602c-.38-.325-.178-.948.321-.988l5.518-.442a.563.563 0 00.475-.345L11.48 3.5z" /></svg>
              </div>
              <input [readonly]="true" formControlName="plan" id="plan" type="text"
                class="w-full bg-emerald-500/10 border border-emerald-500/20 text-emerald-300 text-sm font-bold uppercase tracking-wide rounded-2xl pl-12 pr-4 py-3.5 opacity-90 cursor-not-allowed" />
            </div>
          </div>

          <!-- Fecha Expiración -->
          <div class="flex flex-col group">
            <label for="expiracion" class="text-xs font-bold text-white/50 uppercase tracking-widest mb-2.5 ml-1">Expiración del Plan</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 flex items-center pl-4.5 pointer-events-none">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 text-white/20 ml-4"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
              </div>
              <input [readonly]="true" formControlName="fechaExpiracion" id="expiracion" type="date"
                class="w-full bg-black/10 border border-white/5 text-white/60 text-sm font-medium rounded-2xl pl-12 pr-4 py-3.5 opacity-70 cursor-not-allowed [color-scheme:dark]" />
            </div>
          </div>
          
          <!-- Fecha Registro (Hidden, no aporta a la UI pero está en el FormGroup) -->
          <div class="hidden">
            <input formControlName="fechaRegistro" type="date" />
          </div>

        </div>

        <!-- ACCIONES (Guardar) -->
        <div class="flex justify-end pt-8 mt-4 border-t border-white/10" [class.hidden]="isReadOnly">
          <button type="submit"
            class="flex items-center gap-2 bg-gradient-to-r from-indigo-500 to-purple-500 hover:from-indigo-400 hover:to-purple-400 py-3.5 px-10 rounded-xl text-white font-bold shadow-[0_5px_20px_rgba(79,70,229,0.4)] hover:shadow-[0_8px_25px_rgba(79,70,229,0.6)] hover:-translate-y-1 transition-all duration-300">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
            Guardar Cambios
          </button>
        </div>
        
      </form>
    </div>
  </article>
</main>

@if(isLoadingImage()){
  <app-spinner />
}
