<div class="chatbot-container">
  <!-- Botón flotante -->
  <div class="chatbot-trigger" [ngClass]="{'open': isOpen}" (click)="toggleChat()">
    <ng-container *ngIf="isOpen; else chatIcon">
      <!-- Icono Cerrar (X) -->
      <svg class="chatbot-icon" viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </ng-container>
    <ng-template #chatIcon>
      <!-- Icono Chat -->
      <svg class="chatbot-icon" viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
      </svg>
    </ng-template>
  </div>

  <!-- Ventana de chat -->
  <div class="chatbot-window" [ngClass]="{'active': isOpen}">
    <div class="chatbot-header">
      <svg style="margin-right: 8px" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="10" rx="2"></rect>
        <circle cx="12" cy="5" r="2"></circle>
        <path d="M12 7v4"></path>
        <line x1="8" y1="16" x2="8" y2="16"></line>
        <line x1="16" y1="16" x2="16" y2="16"></line>
      </svg>
      <h3>Asistente IA</h3>
    </div>

    <div class="chatbot-messages" #messagesContainer>
      <div *ngFor="let msg of messages" class="message-wrapper" [ngClass]="msg.sender">
        
        <!-- Avatar del Bot -->
        <div *ngIf="msg.sender === 'bot'" class="message-avatar bot-avatar">
          <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="10" rx="2"></rect>
            <circle cx="12" cy="5" r="2"></circle>
            <path d="M12 7v4"></path>
          </svg>
        </div>

        <!-- Burbuja de mensaje -->
        <div class="message-bubble" [ngClass]="msg.sender">
          <p>{{ msg.text }}</p>
        </div>

        <!-- Avatar del Usuario -->
        <div *ngIf="msg.sender === 'user'" class="message-avatar user-avatar">
          <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </div>
      </div>
      
      <!-- Indicador de carga -->
      <div *ngIf="isLoading" class="message-wrapper bot">
        <div class="message-avatar bot-avatar">
          <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="10" rx="2"></rect>
            <circle cx="12" cy="5" r="2"></circle>
            <path d="M12 7v4"></path>
          </svg>
        </div>
        <div class="message-bubble bot loading">
          <div class="typing-indicator">
            <span></span><span></span><span></span>
          </div>
          <span style="margin-left: 8px; font-size: 13px;">Escribiendo...</span>
        </div>
      </div>
    </div>

    <!-- Input -->
    <div class="chatbot-input">
      <input 
        type="text" 
        placeholder="Escribe tu pregunta..." 
        [(ngModel)]="inputValue"
        (keydown)="handleKeyPress($event)"
        [disabled]="isLoading"
        class="chat-input-field"
      />
      <button 
        class="chat-send-button"
        (click)="handleSend()"
        [disabled]="isLoading || !inputValue.trim()"
      >
        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>
</div>
